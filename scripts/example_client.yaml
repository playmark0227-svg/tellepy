# ======================================================
# telepy スクリプト - 株式会社サンプル
# 商材の情報を深く構造化することでAIが何を聞かれても答えられる
# ======================================================

client_name: "株式会社サンプル"

# --- 商材情報（構造化） ---
product:
  name: "クラウド経費精算ツール「ラクケイ」"
  category: "経費精算SaaS"
  summary: >
    領収書をスマートフォンで撮影するだけでAIが自動仕分け。
    月次の経費精算業務を最大70%削減するクラウドツール。

  features:
    - name: "AIレシート読取"
      benefit: "領収書をスマホで撮るだけ。手入力ゼロで仕分け完了"
      detail: "OCR精度99.2%。手書き領収書にも対応。撮影から仕分けまで平均3秒"
    - name: "自動仕訳・承認フロー"
      benefit: "勘定科目を自動判定。承認もワンクリックで完了"
      detail: "過去の仕訳パターンを学習し、使うほど精度が向上。承認フローは最大5段階まで設定可能"
    - name: "会計ソフト連携"
      benefit: "freee、マネーフォワード、弥生など主要ソフトとワンクリック連携"
      detail: "CSV出力も可能。既存の会計フローを変えずに導入できる"
    - name: "電子帳簿保存法対応"
      benefit: "法改正対応を自動アップデート。紙の保管が不要に"
      detail: "タイムスタンプ自動付与、検索要件も満たした保存。税務調査時もスムーズ"
    - name: "経費分析ダッシュボード"
      benefit: "部門別・費目別の経費をリアルタイムで可視化"
      detail: "予算超過アラート機能付き。月次レポートも自動生成"

  pricing:
    summary: "月額9,800円〜（税別）/ 50名まで"
    plans:
      - name: "スタータープラン"
        price: "月額9,800円"
        users: "50名まで"
        note: "基本機能すべて利用可能"
      - name: "ビジネスプラン"
        price: "月額29,800円"
        users: "200名まで"
        note: "分析機能・API連携・専任サポート付き"
      - name: "エンタープライズ"
        price: "個別見積もり"
        users: "無制限"
        note: "オンプレ対応・SLA保証・導入支援付き"
    free_trial: "30日間無料トライアル。クレジットカード登録不要"
    initial_cost: "初期費用ゼロ。最短即日で利用開始可能"

  case_studies:
    - company: "製造業A社（従業員300名）"
      before: "毎月20時間を経費精算に費やしていた"
      after: "導入後、月6時間に短縮（70%削減）"
      quote: "経理担当者の残業がほぼゼロになりました"
    - company: "IT企業B社（従業員80名）"
      before: "紙の領収書を手作業で入力、月末に集中して残業"
      after: "スマホ撮影で完結。月末の集中作業が解消"
      quote: "社員からの問い合わせが激減しました"
    - company: "商社C社（従業員500名）"
      before: "海外出張の精算に1件30分かかっていた"
      after: "多通貨自動変換で1件5分に短縮"
      quote: "グローバル展開には必須のツールです"

  competitors:
    vs_manual: >
      手作業の場合、1件あたり平均5分の入力時間が必要です。
      月100件の経費があれば、それだけで約8時間。
      ラクケイなら撮影3秒で完了します。
    vs_excel: >
      Excelでの管理は入力ミスが起きやすく、
      月末の集計作業にも時間がかかります。
      ラクケイは自動集計・自動レポートで人的ミスをゼロに。
    vs_other_saas: >
      他社ツールと比べて、ラクケイの強みは3つ。
      1.OCR精度99.2%（業界最高水準）
      2.初期費用ゼロ・30日無料トライアル
      3.既存会計ソフトとのシームレス連携

  faq:
    - q: "導入にどれくらいかかりますか"
      a: "最短即日で利用開始できます。初期設定は管理画面から30分程度で完了します。ご希望であれば導入サポートも無料で承ります"
    - q: "セキュリティは大丈夫ですか"
      a: "SOC2 Type2認証取得済み。データは国内サーバーで暗号化保存。IPアドレス制限やSSO連携にも対応しております"
    - q: "今使っている会計ソフトと連携できますか"
      a: "freee、マネーフォワード、弥生、勘定奉行など主要ソフトに対応しています。API連携で自動同期が可能です"
    - q: "社員への教育は必要ですか"
      a: "スマホで写真を撮るだけなので、特別な教育は不要です。導入企業様の95%が初日から問題なく利用されています"
    - q: "解約に違約金はありますか"
      a: "違約金は一切ございません。月単位での解約が可能です"
    - q: "海外の領収書も対応していますか"
      a: "はい、多言語OCRに対応しており、主要15通貨の自動変換機能もございます"

# --- ターゲット ---
target:
  role: "経理担当者・経理部長・管理部門責任者"
  pain_points:
    - "月末の経費精算作業に追われている"
    - "紙の領収書の管理・保管が面倒"
    - "入力ミスによる差し戻しが多い"
    - "電子帳簿保存法への対応が不安"
    - "経費の可視化ができておらず予算管理が困難"
  decision_factors:
    - "導入コスト（初期費用・月額）"
    - "既存システムとの連携可否"
    - "操作の簡単さ（社員への展開ハードル）"
    - "セキュリティ・コンプライアンス"
    - "サポート体制"

# --- 会話テンプレート ---
greeting: >
  お世話になっております。私、株式会社サンプルのAIアシスタントでございます。
  本日は経理業務の効率化についてご案内のお電話をさせていただきました。
  経理ご担当者様はいらっしゃいますでしょうか。

pitch_angles:
  - name: "時間削減"
    message: >
      多くの企業様で、毎月の経費精算に平均20時間以上かけていらっしゃるのですが、
      御社ではいかがでしょうか。
  - name: "法対応"
    message: >
      来年の電子帳簿保存法の改正に向けて、御社では何か対策を検討されていますか。
  - name: "コスト削減"
    message: >
      経理の人件費を月額9,800円で大幅に削減できる方法がございまして、
      ご興味はございますでしょうか。

objection_responses:
  - trigger: "間に合っています"
    response: >
      かしこまりました。ちなみに現在お使いのシステムでは、
      月にどれくらいのお時間を経費精算に費やされていますか？
      多くの企業様で、乗り換えにより月20時間以上の削減に成功されています。
  - trigger: "忙しい"
    response: >
      お忙しいところ大変失礼いたしました。
      それでは改めてお時間をいただける日はございますでしょうか。
      5分程度のオンラインデモもご用意しておりますので、
      ご都合の良い日時を教えていただけますと幸いです。
  - trigger: "資料だけ送って"
    response: >
      かしこまりました。それでは資料をお送りさせていただきます。
      簡単なデモ動画もございますので、あわせてご確認いただけますと幸いです。
      資料のお届け先のメールアドレスを教えていただけますでしょうか。
  - trigger: "予算がない"
    response: >
      ご事情承知いたしました。実は初期費用ゼロの月額プランもございまして、
      導入コストを抑えてスタートされる企業様も多くいらっしゃいます。
      30日間の無料トライアルもございますので、まずはお試しいただくことも可能です。
  - trigger: "上に相談しないと"
    response: >
      もちろんでございます。ご上司の方にもご検討いただけるよう、
      比較資料をご用意しております。差し支えなければ、
      ご上司の方も含めた15分のオンラインデモはいかがでしょうか。
  - trigger: "他社を使っている"
    response: >
      そうでいらっしゃいますか。ちなみに現在のツールで、
      何かお困りの点やご不便に感じていることはございますか。
      他社様から乗り換えいただくケースも非常に増えております。

closing: >
  ありがとうございます。それでは、15分ほどのオンラインデモで
  具体的なイメージをお持ちいただければと思います。
  来週でしたら火曜と水曜、どちらがご都合よろしいでしょうか。

farewell: >
  お忙しい中お時間をいただき、誠にありがとうございました。
  それでは失礼いたします。
