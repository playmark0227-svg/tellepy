client_name: "株式会社サンプル"
product: "クラウド経費精算ツール「ラクケイ」"
target: "経理担当者"
greeting: >
  お世話になっております。私、株式会社サンプルのAIアシスタントでございます。
  本日は経理業務の効率化についてご案内のお電話をさせていただきました。
  経理ご担当者様はいらっしゃいますでしょうか。
pitch: >
  ありがとうございます。弊社では、クラウド経費精算ツール「ラクケイ」をご提供しております。
  領収書をスマートフォンで撮影するだけで自動仕分けが完了し、
  月次の経費精算業務を最大70%削減した実績がございます。
  現在、無料トライアルもご用意しておりますが、
  15分ほどお時間をいただき、デモをご覧いただくことは可能でしょうか。
objection_responses:
  - trigger: "間に合っています"
    response: >
      かしこまりました。ちなみに現在お使いのシステムでは、
      月にどれくらいのお時間を経費精算に費やされていますか？
      多くの企業様で、乗り換えにより月20時間以上の削減に成功されています。
  - trigger: "忙しい"
    response: >
      お忙しいところ大変失礼いたしました。
      それでは改めてお時間をいただける日はございますでしょうか。
      5分程度のオンラインデモもご用意しておりますので、
      ご都合の良い日時を教えていただけますと幸いです。
  - trigger: "資料だけ送って"
    response: >
      かしこまりました。それでは資料をお送りさせていただきます。
      簡単なデモ動画もございますので、あわせてご確認いただけますと幸いです。
      資料のお届け先のメールアドレスを教えていただけますでしょうか。
  - trigger: "予算がない"
    response: >
      ご事情承知いたしました。実は初期費用ゼロの月額プランもございまして、
      導入コストを抑えてスタートされる企業様も多くいらっしゃいます。
      まずは情報としてお持ちいただくだけでも、いかがでしょうか。
closing: >
  ありがとうございます。それでは、デモのお時間を調整させていただければと思います。
  来週でご都合の良いお日にちはございますでしょうか。
farewell: >
  お忙しい中お時間をいただき、誠にありがとうございました。
  それでは失礼いたします。
